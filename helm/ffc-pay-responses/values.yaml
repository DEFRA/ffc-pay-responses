environment: production
environmentCode:
name: ffc-pay-responses
namespace: ffc-pay
workstream: ffc-pay
image: ffc-pay-responses

labels:
  component: service

appInsights:
  connectionString:

containerConfigMap:
  name: ffc-pay-responses-config-map

containerSecret:
  name: ffc-pay-responses
  type: Opaque

deployment: {}

container:
  requestMemory: 10Mi
  requestCpu: 10m
  limitMemory: 250Mi
  limitCpu: 250m
  messageQueueHost: namespace.servicebus.windows.net
  acknowledgementTopicAddress: ffc-pay-acknowledgement
  returnTopicAddress: ffc-pay-return
  eventsTopicAddress: ffc-pay-events
  paymentSubmitTopicAddress: ffc-pay-submit
  paymentSubmitSubscriptionAddress: ffc-pay-responses
  azureStorageAccountName: ffcpay
  azureStorageConnectionString: dummy
  azureStorageUseConnectionString: false  
  azureStorageCreateContainers: false
  storageContainer: dax
  inboundFolder: inbound
  archiveFolder: archive
  quarantineFolder: quarantine
  returnFolder: return
  processingActive: true
  port: 3012

postgresService:
  postgresDb: ffc_pay_responses
  postgresqlHost: ffc-pay-responses-postgres
  postgresPort: 5432
  postgresSchema: public
  postgresUser: postgres

readinessProbe:
  path: /healthy
  port: 3012
  initialDelaySeconds: 60
  periodSeconds: 120
  failureThreshold: 5
  timeoutSeconds: 30

livenessProbe:
  path: /healthz
  port: 3012
  initialDelaySeconds: 70
  periodSeconds: 120
  failureThreshold: 5
  timeoutSeconds: 30

workloadIdentity: true

azureIdentity:
  clientID: not-a-real-clientID
  resourceID: not-a-real-resourceID

secretProviderClass:
  azure:
    keyvaultName: SNDFFCINFKV2001
    objects: # reading the secret from Azure Key Vault
      - objectName: appInsights-connectionString # secret name in Azure Key Vault
        objectType: secret

  secretObjects: # creating a Kubernetes secret from the Azure Key Vault secrets
    - secretName: ffc-pay-responses
      type: Opaque
      data:
        - objectName: appInsights-connectionString # secret name in Azure Key Vault
          key: APPINSIGHTS_CONNECTION_STRING # the secret key in the Kubernetes secret and use in the application
